<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Video Downloader</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{
    --bg:#ffffff;
    --card:#ffffff;
    --accent:#000000;
    --text:#000000;
    --muted:#4a4a4a;
    --line:#000000;
    --shadow:#000000;
}
body[data-theme="dark"]{
    --bg:#000000;
    --card:#000000;
    --accent:#ffffff;
    --text:#ffffff;
    --muted:#b8b8b8;
    --line:#ffffff;
    --shadow:#000000;
}
body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:"Inter","Arial",sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:2.5rem 1rem 1rem;
    line-height:1.45;
    text-rendering:optimizeLegibility;
    -webkit-font-smoothing:antialiased;
}
.theme-floating{
    position:fixed;
    top:14px;
    right:18px;
    z-index:20;
}
.container{
    background:var(--card);
    padding:1.25rem;
    border-radius:20px;
    border:3px solid var(--line);
    box-shadow:8px 8px 0 var(--shadow);
    width:100%;
    max-width:760px;
}
.toolbar{
    margin-bottom:.6rem;
}
.brand{
    font-size:.8rem;
    font-weight:700;
    letter-spacing:.08em;
    color:var(--muted);
}
.theme-btn{
    background:var(--card);
    color:var(--line);
    border-radius:999px;
    padding:.4rem .8rem;
    font-size:.8rem;
    border:2px solid var(--line);
    box-shadow:2px 2px 0 var(--line);
}
h1{
    margin:0 0 .35rem;
    font-size:clamp(1.45rem,2.4vw,2rem);
    text-align:left;
    color:var(--accent);
    letter-spacing:.3px;
}
.subtitle{
    margin:0 0 1rem;
    color:var(--muted);
    font-size:.95rem;
}
.input-group{
    display:flex;
    gap:.6rem;
    margin-bottom:1rem;
}
input{
    flex:1;
    padding:.72rem .82rem;
    border:2px solid var(--line);
    border-radius:12px;
    background:var(--card);
    color:var(--text);
}
input:focus{
    outline:none;
    box-shadow:0 0 0 3px rgba(255,95,46,.2);
}
button{
    padding:.68rem 1rem;
    border:2px solid var(--line);
    border-radius:12px;
    background:var(--accent);
    color:var(--bg);
    box-shadow:3px 3px 0 var(--line);
    cursor:pointer;
    transition:transform .1s,filter .2s;
}
button:hover{filter:brightness(1.12);}
button:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--line);}
button:disabled{
    opacity:.6;
    cursor:not-allowed;
}
.panel{
    border:2px solid var(--line);
    border-radius:16px;
    padding:1rem;
    background:var(--card);
    margin-bottom:.85rem;
}
.hidden{display:none;}
.meta{
    margin-bottom:.85rem;
    animation:fade .3s ease-out;
}
.meta .title{
    font-weight:600;
    font-size:1.12rem;
    margin-bottom:.25rem;
    word-break:break-word;
}
.meta .details{
    font-size:.95rem;
    color:var(--muted);
}
.badge{
    display:inline-block;
    padding:.2rem .6rem;
    background:var(--card);
    border:2px solid var(--line);
    border-radius:999px;
    font-size:.82rem;
    margin-top:.4rem;
}
.options{
    margin-bottom:.85rem;
    animation:fade .3s ease-out;
}
.row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:.85rem;
}
label{
    font-size:.84rem;
    font-weight:600;
}
select{
    width:100%;
    padding:.65rem;
    border:2px solid var(--line);
    border-radius:12px;
    background:var(--card);
    color:var(--text);
    margin-top:.5rem;
}
.download-btn{
    width:100%;
    padding:.78rem;
    background:var(--accent);
    font-weight:600;
    margin-top:.8rem;
}
.status{
    text-align:center;
    margin-top:.5rem;
}
.spinner{
    width:24px;
    height:24px;
    border:3px solid color-mix(in oklab, var(--line) 25%, transparent);
    border-top-color:var(--accent);
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:0 auto .5rem;
}
.toast{
    position:fixed;
    bottom:1rem;
    left:50%;
    transform:translateX(-50%);
    background:#d32f2f;
    color:#fff;
    padding:.6rem 1rem;
    border-radius:10px;
    border:2px solid var(--line);
    box-shadow:4px 4px 0 var(--line);
    opacity:0;
    transition:opacity .3s;
}
.toast.show{opacity:1;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fade{from{opacity:0;}to{opacity:1;}}
@media(max-width:480px){
    body{padding:3.2rem .7rem .7rem;}
    .theme-floating{
        top:10px;
        right:10px;
    }
    .theme-btn{
        font-size:.74rem;
        padding:.34rem .72rem;
    }
    .container{
        padding:.9rem;
        border-width:2px;
        border-radius:14px;
        box-shadow:5px 5px 0 var(--shadow);
    }
    .row{grid-template-columns:1fr;}
    .input-group{
        flex-direction:column;
        gap:.55rem;
    }
    .input-group button{width:100%;}
    .panel{
        border-width:2px;
        border-radius:12px;
        padding:.82rem;
    }
    .meta .title{
        font-size:1rem;
    }
    .meta .details{
        font-size:.88rem;
    }
    .download-btn{
        margin-top:.7rem;
    }
}
@media(min-width:481px) and (max-width:900px){
    .container{
        max-width:690px;
    }
    .input-group{
        align-items:center;
    }
    .input-group button{
        min-width:108px;
    }
}
</style>
</head>
<body>
<div class="theme-floating">
    <button id="themeBtn" class="theme-btn" type="button">Dark Mode</button>
</div>
<div class="container">
    <div class="toolbar">
        <div class="brand">GO DOWNLOADER</div>
    </div>
    <h1>Video Downloader</h1>
    <p class="subtitle">Unduh video, audio, dan foto secara cepat.</p>
    <div class="input-group">
        <input type="text" id="urlInput" placeholder="Paste video URL here">
        <button id="infoBtn">Get Info</button>
    </div>

    <div id="metaBox" class="meta hidden panel">
        <div class="title" id="metaTitle"></div>
        <div class="details" id="metaDetails"></div>
        <div class="badge" id="metaDuration"></div>
    </div>

    <div id="optionsBox" class="options hidden panel">
        <div class="row">
            <div>
                <label for="formatSelect">Format</label>
                <select id="formatSelect">
                    <option value="mp4">Video (MP4)</option>
                    <option value="mp3">Audio (MP3)</option>
                    <option value="photo">Photo (Image)</option>
                </select>
            </div>

            <div id="resWrapper">
                <label for="resSelect">Resolution</label>
                <select id="resSelect">
                    <option value="360">360p</option>
                    <option value="480">480p</option>
                    <option value="720" selected>720p</option>
                    <option value="1080">1080p</option>
                </select>
            </div>
        </div>

        <button id="downloadBtn" class="download-btn">Download</button>
    </div>

    <div id="statusBox" class="status hidden">
        <div class="spinner"></div>
        <div id="statusMsg"></div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
const urlInput=document.getElementById('urlInput');
const infoBtn=document.getElementById('infoBtn');
const metaBox=document.getElementById('metaBox');
const metaTitle=document.getElementById('metaTitle');
const metaDetails=document.getElementById('metaDetails');
const metaDuration=document.getElementById('metaDuration');
const optionsBox=document.getElementById('optionsBox');
const formatSelect=document.getElementById('formatSelect');
const resWrapper=document.getElementById('resWrapper');
const resSelect=document.getElementById('resSelect');
const downloadBtn=document.getElementById('downloadBtn');
const statusBox=document.getElementById('statusBox');
const statusMsg=document.getElementById('statusMsg');
const toast=document.getElementById('toast');
const themeBtn=document.getElementById('themeBtn');

function showToast(msg){
    toast.textContent=msg;
    toast.classList.add('show');
    setTimeout(()=>toast.classList.remove('show'),3000);
}

function setLoading(show,msg=''){
    if(show){
        statusBox.classList.remove('hidden');
        statusMsg.textContent=msg;
    }else{
        statusBox.classList.add('hidden');
    }
}

const savedTheme=localStorage.getItem('theme');
if(savedTheme){
    document.body.setAttribute('data-theme',savedTheme);
}else if(window.matchMedia('(prefers-color-scheme: dark)').matches){
    document.body.setAttribute('data-theme','dark');
}

function syncThemeButton(){
    const isDark=document.body.getAttribute('data-theme')==='dark';
    themeBtn.textContent=isDark?'Light Mode':'Dark Mode';
}
syncThemeButton();

themeBtn.addEventListener('click',()=>{
    const isDark=document.body.getAttribute('data-theme')==='dark';
    const nextTheme=isDark?'light':'dark';
    if(nextTheme==='light'){
        document.body.removeAttribute('data-theme');
    }else{
        document.body.setAttribute('data-theme','dark');
    }
    localStorage.setItem('theme',nextTheme);
    syncThemeButton();
});

infoBtn.addEventListener('click', async()=>{
    const url=urlInput.value.trim();
    if(!url){showToast('Masukkan URL');return;}
    infoBtn.disabled=true;
    setLoading(true,'Menganalisa...');
    try{
        const resp=await fetch(`/metadata?url=${encodeURIComponent(url)}`);
        if(!resp.ok) throw new Error('Gagal ambil metadata');
        const data=await resp.json();
        metaTitle.textContent=data.title||'';
        metaDetails.textContent=data.details||'';
        metaDuration.textContent=data.duration||'';
        metaBox.classList.remove('hidden');
        optionsBox.classList.remove('hidden');
    }catch(e){
        showToast(e.message);
    }finally{
        setLoading(false);
        infoBtn.disabled=false;
    }
});

formatSelect.addEventListener('change',()=>{
    if(formatSelect.value==='mp4'){
        resWrapper.classList.remove('hidden');
    }else{
        resWrapper.classList.add('hidden');
    }
});

downloadBtn.addEventListener('click', async()=>{
    const url=urlInput.value.trim();
    if(!url){showToast('Masukkan URL');return;}
    const format=formatSelect.value;
    const res=resSelect.value;
    downloadBtn.disabled=true;
    setLoading(true,'Mengunduh...');
    try{
        const params=new URLSearchParams({url,format});
        if(format==='mp4') params.append('res',res);
        if(format==='mp4'){
            const directLink=document.createElement('a');
            directLink.href=`/dl?${params.toString()}`;
            directLink.rel='noopener';
            document.body.appendChild(directLink);
            directLink.click();
            document.body.removeChild(directLink);
            statusMsg.textContent='Streaming langsung ke browser...';
            return;
        }
        const resp=await fetch(`/dl?${params.toString()}`);
        if(!resp.ok){
            const err=await resp.json().catch(()=>({}));
            throw new Error(err.error||'Unduh gagal');
        }
        const cd=resp.headers.get('Content-Disposition');
        let filename='download';
        if(cd && cd.includes('filename=')){
            filename=cd.split('filename=')[1].replace(/"/g,'');
        }
        const blob=await resp.blob();
        const link=document.createElement('a');
        link.href=URL.createObjectURL(blob);
        link.download=filename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(link.href);
        statusMsg.textContent='Selesai! File diunduh.';
    }catch(e){
        showToast(e.message);
    }finally{
        setLoading(false);
        downloadBtn.disabled=false;
    }
});
</script>
</body>
</html>
